server:
  port: 8080

spring:
  application:
    name: netverse-protocol-lab
  datasource:
    url: ${NETVERSE_DB_URL:jdbc:mysql://localhost:3307/netverse_lab?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${NETVERSE_DB_USERNAME:root}
    password: ${NETVERSE_DB_PASSWORD:131467}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

netverse:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
