services:
  mysql:
    image: mysql:8.4
    container_name: netverse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 131467
      MYSQL_DATABASE: netverse_lab
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - netverse_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p131467"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  netverse_mysql_data:
