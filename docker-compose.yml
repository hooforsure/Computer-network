services:
  mysql:
    image: mysql:8.4
    container_name: netverse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NETVERSE_MYSQL_ROOT_PASSWORD:?Set NETVERSE_MYSQL_ROOT_PASSWORD in .env or your shell}
      MYSQL_DATABASE: ${NETVERSE_MYSQL_DATABASE:-netverse_lab}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${NETVERSE_MYSQL_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - netverse_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  netverse_mysql_data:
